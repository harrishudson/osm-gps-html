}

// =============================================================
// SCREEN WAKE LOCK
// Keeps the screen on during navigation.
// Method 1: WakeLock API  -- Chrome 84+, Edge, Android Chrome,
//           Safari 16.4+ (but NOT Chrome/Opera on iOS).
// Method 2: Silent looping video -- the only reliable method
//           on iOS Safari. iOS will not sleep the screen while
//           a video is playing. We retry on every touch event
//           since iOS can pause the video when screen dims.
// =============================================================
// =============================================================
// SCREEN WAKE LOCK
// Three layered methods, all active simultaneously:
//
// Method 1: WakeLock API (Chrome 84+, Edge, Safari 16.4+)
//           Most reliable when available. Auto re-acquires.
//
// Method 2: Silent looping video (iOS Safari fallback)
//           iOS will not sleep while a video element plays.
//           Must be started from a user gesture. Re-triggered
//           on every touch in case iOS pauses it.
//
// Method 3: DeviceMotionEvent / DeviceOrientationEvent polling
//           Subscribing to motion/orientation events tells iOS
//           the page needs continuous sensor access, which
//           suppresses the auto-lock timer. Silent, no battery
//           impact beyond normal sensor polling. Works even
//           when the other two methods are throttled.
//
// All three are belt-and-suspenders: any one working is enough.
// =============================================================
var wakeLockObj       = null;
var wakeActive        = false;
var orientationActive = false;

function initWakeLock() {

  // Try video immediately (will silently fail until first gesture on iOS)
  startVideoWake();

  function activateAll() {
    if (wakeActive) return;
    wakeActive = true;
    startVideoWake();
    requestWakeLockAPI();
    startOrientationWake();
  }

  // Re-check video and orientation on every touch.
  // iOS can pause the video or drop the sensor subscription silently.
  document.addEventListener('touchstart', function() {
    warmUpSpeech();
    startVideoWake();
    startOrientationWake();
    if (!wakeActive) activateAll();
  }, { passive: true });

  document.addEventListener('click', function() {
    warmUpSpeech();
    startVideoWake();
    if (!wakeActive) activateAll();
  });

  // Re-acquire everything when page becomes visible again
  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'visible') {
      startVideoWake();
      startOrientationWake();
      if (window.speechSynthesis && window.speechSynthesis.paused) {
        window.speechSynthesis.resume();
      }
      if (wakeActive && 'wakeLock' in navigator && !wakeLockObj) {
        requestWakeLockAPI();
      }
    }
  });
}

// Method 1: WakeLock API
function requestWakeLockAPI() {
  if (!('wakeLock' in navigator)) return;
  navigator.wakeLock.request('screen')
    .then(function(lock) {
      wakeLockObj = lock;
      lock.addEventListener('release', function() {
        wakeLockObj = null;
        // Auto re-acquire — iOS releases the lock when tab is backgrounded
        if (wakeActive && document.visibilityState === 'visible') {
          setTimeout(requestWakeLockAPI, 500);
        }
      });
    })
    .catch(function(e) {
      // Silently fail — video + orientation methods are still active
      console.warn('WakeLock API unavailable:', e.message);
    });
}

// Method 2: Silent video
function startVideoWake() {
  var v = document.getElementById('noSleepVid');
  if (!v) return;
  if (v.paused) {
    v.play().catch(function() {
      // Autoplay blocked — will retry on next user gesture
    });
  }
}

// Method 3: DeviceOrientation / DeviceMotion event subscription
// Keeping an active listener prevents iOS from engaging auto-lock
// because the OS believes the page is consuming live sensor data.
function startOrientationWake() {
  if (orientationActive) return;

  // iOS 13+ requires permission for DeviceMotionEvent
  if (typeof DeviceMotionEvent !== 'undefined' &&
      typeof DeviceMotionEvent.requestPermission === 'function') {
    // requestPermission must be called from a user gesture.
    // We call it here since startOrientationWake is always called
    // from a touchstart or click handler.
    DeviceMotionEvent.requestPermission()
      .then(function(state) {
        if (state === 'granted') {
          attachOrientationListener();
        } else {
          // Permission denied — fall back silently to video + WakeLock
          console.warn('DeviceMotion permission denied');
        }
      })
      .catch(function() {
        // requestPermission threw (e.g. non-iOS browser) — try direct attach
        attachOrientationListener();
      });
  } else {
    // Non-iOS or older iOS — attach directly (no permission needed)
    attachOrientationListener();
  }
}

function attachOrientationListener() {
  if (orientationActive) return;

  // Prefer DeviceOrientationEvent (lower battery than motion)
  var eventName = (typeof DeviceOrientationEvent !== 'undefined')
    ? 'deviceorientation'
    : (typeof DeviceMotionEvent !== 'undefined' ? 'devicemotion' : null);

  if (!eventName) return;

  // The handler itself does nothing — the subscription is what matters
  function noopHandler() {}

  window.addEventListener(eventName, noopHandler, { passive: true });
  orientationActive = true;

  // Belt-and-suspenders: re-attach every 30 seconds in case iOS drops it
  setInterval(function() {
    if (orientationActive) {
      window.removeEventListener(eventName, noopHandler);
      window.addEventListener(eventName, noopHandler, { passive: true });
    }
  }, 30000);
}

// =============================================================
// SCHOOL ZONE DETECTION
// After routing, fetch schools near the route from Overpass.
// On each GPS update, check if we are within SCHOOL_RADIUS_M
// of any school during Australian school hours (weekdays only).
//
// IMPORTANT: This is best-effort. It depends on schools being
// tagged in OpenStreetMap for your area. Coverage is generally
// good in Australian cities but may be incomplete in some areas.
// Do NOT rely solely on this for school zone compliance.
// Always observe posted signs.
// =============================================================
var SCHOOL_RADIUS_M  = 150;  // metres from school to trigger warning
var SCHOOL_HOURS     = [     // [startHour, startMin, endHour, endMin] AEST (UTC+10)
  [8, 0,  9, 30],            // morning zone
  [14, 30, 16, 0]            // afternoon zone
];

function fetchSchoolsNearRoute() {
  if (!routeCoords || routeCoords.length === 0) return;

  // Build bounding box around the route with a small buffer
  var lats = routeCoords.map(function(c) { return c[0]; });
  var lons = routeCoords.map(function(c) { return c[1]; });
  var s = Math.min.apply(null, lats) - 0.005;
  var n = Math.max.apply(null, lats) + 0.005;
  var w = Math.min.apply(null, lons) - 0.005;
  var e = Math.max.apply(null, lons) + 0.005;

  var q = '[out:json][timeout:20];' +
          '(node["amenity"="school"](' + s + ',' + w + ',' + n + ',' + e + ');' +
          'way["amenity"="school"](' + s + ',' + w + ',' + n + ',' + e + ');' +
          'relation["amenity"="school"](' + s + ',' + w + ',' + n + ',' + e + '););' +
          'out center;';

  fetch(OVERPASS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: 'data=' + encodeURIComponent(q)
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    nearbySchools = (data.elements || []).map(function(el) {
      var lat = el.lat || (el.center && el.center.lat);
      var lon = el.lon || (el.center && el.center.lon);
      return { lat: lat, lon: lon, name: (el.tags && el.tags.name) || 'School' };
    }).filter(function(s) { return s.lat && s.lon; });
    console.log('School zones loaded: ' + nearbySchools.length + ' schools near route');
  })
  .catch(function(e) {
    console.warn('School zone fetch failed (non-critical):', e.message);
  });
}

function checkSchoolZone(lat, lon) {
  if (!nearbySchools.length) {
    if (inSchoolZone) setSchoolZone(false);
    return;
  }

  // Check if current time is within school zone hours (using local time)
  var now     = new Date();
  var day     = now.getDay();           // 0=Sun, 6=Sat
  var hh      = now.getHours();
  var mm      = now.getMinutes();
  var isWeekday = day >= 1 && day <= 5;
  var inHours = false;

  if (isWeekday) {
    for (var i = 0; i < SCHOOL_HOURS.length; i++) {
      var sh = SCHOOL_HOURS[i];
      var startMins = sh[0] * 60 + sh[1];
      var endMins   = sh[2] * 60 + sh[3];
      var nowMins   = hh * 60 + mm;
      if (nowMins >= startMins && nowMins < endMins) { inHours = true; break; }
    }
  }

  if (!inHours) {
    if (inSchoolZone) setSchoolZone(false);
    return;
  }

  // Check proximity to any school
  var near = false;
  for (var j = 0; j < nearbySchools.length; j++) {
    if (haversineM(lat, lon, nearbySchools[j].lat, nearbySchools[j].lon) < SCHOOL_RADIUS_M) {
      near = true; break;
    }
  }
  setSchoolZone(near);
}

function setSchoolZone(active) {
  if (active === inSchoolZone) return;
  inSchoolZone = active;
  g('schoolZone').classList.toggle('show', active);

  if (active) {
    // Override speed limit display to 40 while in zone
    setCurrentLimit(40);
    if (speechOn && !schoolZoneSpoken) {
      speak('Warning, school zone ahead. Speed limit 40 kilometres per hour.');
      schoolZoneSpoken = true;
    }
  } else {
    schoolZoneSpoken = false;
    // Restore the step's normal limit
    if (steps[stepIdx]) setCurrentLimit(steps[stepIdx].limitKmh);
  }
}

// =============================================================
// ROUTE LINE TRIMMING
// Redraws only the remaining (undriven) portion of the route
// on each GPS update, snapping it to the nearest polyline point.
// =============================================================
function trimRouteDisplay(lat, lon) {
  if (!routeCoords || routeCoords.length < 2 || !map) return;

  // Find the nearest segment index on the route polyline
  var bestIdx  = 0;
  var bestDist = Infinity;
  for (var i = 0; i < routeCoords.length - 1; i++) {
    var d = ptSegM(lat, lon,
      routeCoords[i][0],   routeCoords[i][1],
      routeCoords[i+1][0], routeCoords[i+1][1]);
    if (d < bestDist) { bestDist = d; bestIdx = i; }
  }

  // Slice from nearest point onward
  var remaining = routeCoords.slice(bestIdx);
  if (remaining.length < 2) return;

  if (remainingLayer) map.removeLayer(remainingLayer);
  remainingLayer = L.layerGroup([
    L.polyline(remaining, { color: '#f5a623', weight: 9, opacity: 0.18 }),
    L.polyline(remaining, { color: '#f5a623', weight: 4, opacity: 1.0  })
  ]).addTo(map);
}

// =============================================================
// GEOMETRY
// =============================================================
function haversineM(a, b, c, d) {
  var R = 6371000;
  var da = (c - a) * Math.PI / 180;
  var db = (d - b) * Math.PI / 180;
  var x  = Math.sin(da/2)*Math.sin(da/2) +
           Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(db/2)*Math.sin(db/2);
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
}

function distFromPolylineM(lat, lon, coords) {
  var min = Infinity;
  for (var i = 0; i < coords.length - 1; i++) {
    var d = ptSegM(lat, lon, coords[i][0], coords[i][1], coords[i+1][0], coords[i+1][1]);
    if (d < min) min = d;
  }
  return min;
}

function ptSegM(px, py, ax, ay, bx, by) {
  var dx = bx - ax, dy = by - ay;
  if (dx === 0 && dy === 0) return haversineM(px, py, ax, ay);
  var t = Math.max(0, Math.min(1, ((px-ax)*dx + (py-ay)*dy) / (dx*dx + dy*dy)));
  return haversineM(px, py, ax + t*dx, ay + t*dy);
}

// =============================================================
// UTILITIES
// =============================================================
function g(id)  { return document.getElementById(id); }
function cap(s) { return s ? s[0].toUpperCase() + s.slice(1) : ''; }
function esc(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }
function fmtDist(m) {
  return m >= 1000 ? (m/1000).toFixed(1) + ' kilometres' : Math.round(m) + ' metres';
}

function setPill(id, cls) {
  var el = document.getElementById(id);
  if (el) el.className = 'pdot' + (cls ? ' ' + cls : '');
}

function toast(msg, dur) {
  var t = g('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, dur || 3500);
}
